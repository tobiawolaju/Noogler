<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#25d366" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Manage Agents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:FILL@0..1" />
  <link rel="stylesheet" href="/src/shared/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body {
      background: var(--bg-primary);
    }

    .search-container {
      display: flex;
      flex-direction: row-reverse;
      align-items: center;
      background: var(--bg-secondary);
      border-radius: 999px;
      border: 1px solid var(--border-color);
      overflow: hidden;
      transition: width 0.3s cubic-bezier(0.2, 0, 0, 1);
      width: 40px;
      height: 40px;
      margin-left: auto;
    }

    .search-container.expanded {
      width: 220px;
    }

    .search-icon-btn {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      border: none;
      background: transparent;
      outline: none;
    }

    .search-input {
      flex: 1;
      height: 100%;
      border: none !important;
      background: transparent !important;
      padding: 0 0 0 14px !important;
      font-size: 0.95rem;
      outline: none;
      width: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .search-container.expanded .search-input {
      width: auto;
      opacity: 1;
    }

    .agents-shell {
      max-width: 1080px;
      margin: 0 auto;
      padding: 20px 16px 100px;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .agents-shell::-webkit-scrollbar {
      display: none;
    }

    .signout-chip {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-xs) var(--space-sm);
      background-color: var(--bg-secondary);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border-color);
    }

    .signout-chip img {
      width: 24px;
      height: 24px;
      border-radius: var(--radius-full);
    }

    .signout-chip .signout-label {
      color: var(--text-muted);
      font-weight: 400;
      margin-left: 2px;
    }

    .agents-top {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding: 8px 0;
      background: var(--bg-primary);
      backdrop-filter: blur(4px);
    }



    .agents-title {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: -0.01em;
    }

    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 14px;
    }

    .agent-skeleton {
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sk-line {
      height: 12px;
      border-radius: 999px;
      background: #e2e8f0;
      background-size: 200% 100%;
      animation: sk-shimmer 1.2s ease-in-out infinite;
    }

    .sk-line.title {
      width: 62%;
      height: 16px;
    }

    .sk-line.mid {
      width: 100%;
    }

    .sk-line.short {
      width: 48%;
    }

    @keyframes sk-shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    .agent-card {
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 12px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-align: left;
      align-items: flex-start;
      position: relative;
      transition: transform var(--motion-fast), background-color var(--motion-fast), border-color var(--motion-fast);
      box-shadow: none;
      animation: cardIn .22s ease-out;
    }

    .agent-card:hover {
      transform: translateY(-1px);
      box-shadow: none;
      border-color: rgba(37, 99, 235, .28);
      background: #fcfdfd;
    }

    .agent-more {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      border: transparent;
      background: transparent;
      color: var(--text-secondary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transform: rotate(90deg);
    }

    .agent-card h3 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.3;
    }

    .agent-head {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding-right: 34px;
    }

    .agent-avatar {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: #f2f5f8;
      object-fit: cover;
      flex-shrink: 0;
    }

    .agent-card p {
      margin: 0;
      color: var(--text-secondary);
      font-size: .9rem;
      line-height: 1.45;
    }

    .agent-empty {
      color: var(--text-secondary);
    }

    .agents-fab {
      height: 56px;
      border-radius: 20px;
      border: none;
      background: var(--accent);
      color: var(--text-on-accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 16px;
      box-shadow: none;
      font-weight: 600;
      letter-spacing: .01em;
    }

    .agents-fab-stack {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .agents-fab-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 10px;
    }

    .agents-modal {
      position: fixed;
      inset: 0;
      background: transparent;
      display: none;
      align-items: flex-end;
      padding: 0;
      z-index: 60;
    }

    .agents-modal.open {
      display: flex;
      animation: fadeIn .2s ease-out;
    }

    .agents-sheet {
      width: 100%;
      background: var(--bg-secondary);
      border-radius: 16px 16px 0 0;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 92vh;
      overflow: auto;
      box-shadow: none;
      z-index: 61;
      animation: sheetUp .22s ease-out;
    }

    .agents-sheet h2 {
      margin: 0 0 4px;
      font-size: 1.05rem;
    }

    .agents-sheet label {
      font-size: .78rem;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .agents-sheet input,
    .agents-sheet textarea {
      width: 100%;
      padding: 10px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
    }

    .agents-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes sheetUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (min-width: 900px) {
      .agents-modal {
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .agents-sheet {
        width: min(420px, 92vw);
        border-radius: 16px;
        max-height: none;
      }
    }
  </style>
</head>

<body>
  <main class="agents-shell">
    <div class="agents-top" style="justify-content: space-between;">
      <h1 class="agents-title">Agents</h1>
      <div class="search-container">
        <button class="search-icon-btn" id="search-btn" aria-label="Search agents">
          <span class="material-symbols-outlined" aria-hidden="true">search</span>
        </button>
        <input type="text" id="search-input" class="search-input" placeholder="Search agents..." />
      </div>
    </div>
    <div id="agents-empty" class="agent-empty">No agents yet. Create one with +</div>
    <section id="agents-grid" class="agents-grid"></section>
  </main>

  <div class="agents-fab-stack">
    <div id="signout-chip" class="signout-chip">
      <img id="chip-avatar" src="" alt="avatar" />
      <span id="chip-name">Tobi</span>
      <span class="signout-label">· Sign out</span>
    </div>

    <div class="agents-fab-row">
      <button id="download-agent" class="agents-fab" aria-label="Download Noogle">
        <span class="material-symbols-outlined" aria-hidden="true">download</span>
        <span>Download Noogle</span>
      </button>

      <button id="fab" class="agents-fab" aria-label="Create agent">
        <span class="material-symbols-outlined" aria-hidden="true">&#xE145;</span>
        <span>Add intern</span>
      </button>
    </div>
  </div>

  <div id="modal" class="agents-modal" role="dialog" aria-modal="true">
    <form id="create-form" class="agents-sheet">
      <h2>Create Agent</h2>
      <label for="agent-tag">Agent Tag</label>
      <input id="agent-tag" placeholder="Agent 1" required />
      <div class="agents-actions">
        <button type="button" class="btn secondary" id="cancel">Cancel</button>
        <button type="submit" class="btn primary">Create</button>
      </div>
    </form>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js';
    import { browserLocalPersistence, browserSessionPersistence, getAuth, onAuthStateChanged, setPersistence, signOut } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js';
    import { getDatabase, ref, get, push, set, update } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js';

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        const isLocalDev = ["localhost", "127.0.0.1"].includes(window.location.hostname);
        if (isLocalDev) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((r) => r.unregister()));
          return;
        }
        navigator.serviceWorker.register("/sw.js").catch(() => { });
      });
    }

    const firebaseConfig = {
      apiKey: "AIzaSyC0lb9VsaR09vuhPI1tVpmi_vtP9IMGwVM",
      authDomain: "noogler-490414.firebaseapp.com",
      databaseURL: "https://noogler-490414-default-rtdb.firebaseio.com",
      projectId: "noogler-490414",
      storageBucket: "noogler-490414.firebasestorage.app",
      messagingSenderId: "265815053881",
      appId: "1:265815053881:web:0bfa8a367670f4b04a1fe8",
      measurementId: "G-BR5XWXZRVK"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const grid = document.getElementById('agents-grid');
    const empty = document.getElementById('agents-empty');
    const modal = document.getElementById('modal');
    const fab = document.getElementById('fab');
    const downloadAgentBtn = document.getElementById('download-agent');
    const form = document.getElementById('create-form');
    const cancel = document.getElementById('cancel');
    const tagInput = document.getElementById('agent-tag');
    const signoutChip = document.getElementById('signout-chip');
    const chipAvatar = document.getElementById('chip-avatar');
    const chipName = document.getElementById('chip-name');

    let uid = null;

    const makeAgentAvatar = (tag = 'Agent 1') => {
      const seed = encodeURIComponent((tag || 'Agent 1').trim() || 'Agent 1');
      return `https://api.dicebear.com/9.x/lorelei/svg?seed=${seed}`;
    };

    function openModal() { modal.classList.add('open'); }
    function closeModal() { modal.classList.remove('open'); form.reset(); }
    function showSkeletons() {
      grid.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const sk = document.createElement('div');
        sk.className = 'agent-skeleton';
        sk.innerHTML = `
          <div class="sk-line title"></div>
          <div class="sk-line mid"></div>
          <div class="sk-line mid"></div>
          <div class="sk-line short"></div>
        `;
        grid.appendChild(sk);
      }
      empty.style.display = 'none';
    }

    let allAgents = [];
    let searchQuery = "";

    const searchBtn = document.getElementById('search-btn');
    const searchInput = document.getElementById('search-input');
    const searchContainer = searchBtn.parentElement;

    searchBtn.onclick = (e) => {
      e.stopPropagation();
      searchContainer.classList.toggle('expanded');
      if (searchContainer.classList.contains('expanded')) {
        searchInput.focus();
      } else {
        if (searchInput.value) {
          searchInput.value = '';
          searchQuery = '';
          renderAgentsGrid();
        }
      }
    };

    searchInput.onclick = (e) => e.stopPropagation();

    document.addEventListener('click', (e) => {
      if (searchContainer.classList.contains('expanded') && !searchInput.value) {
        searchContainer.classList.remove('expanded');
      }
    });

    searchInput.oninput = (e) => {
      searchQuery = e.target.value.toLowerCase();
      renderAgentsGrid();
    };

    async function renderAgents() {
      showSkeletons();
      const snap = await get(ref(db, `users/${uid}/agents`));
      allAgents = snap.exists() ? Object.entries(snap.val()) : [];
      renderAgentsGrid();
    }

    function renderAgentsGrid() {
      grid.innerHTML = '';

      const filteredAgents = allAgents.filter(([id, item]) =>
        (item.agent_tag || 'Agent 1').toLowerCase().includes(searchQuery) ||
        (item.agent_soul || '').toLowerCase().includes(searchQuery)
      );

      empty.style.display = filteredAgents.length ? 'none' : 'block';
      filteredAgents.forEach(([id, item]) => {
        const card = document.createElement('div');
        card.className = 'agent-card';
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        card.innerHTML = `
          <button class="agent-more" type="button" aria-label="Open dashboard">
            <span class="material-symbols-outlined" aria-hidden="true">more_horiz</span>
          </button>
          <div class="agent-head">
            <img class="agent-avatar" src="${item.avatar_url || makeAgentAvatar(item.agent_tag || 'Agent 1')}" alt="${item.agent_tag || 'Agent 1'} avatar" />
            <h3>${item.agent_tag || 'Agent 1'}</h3>
          </div>
          <p>${(item.agent_soul || 'No soul yet').slice(0, 90)}</p>
          <p>${item.gemini_api_key ? 'API key saved' : 'No API key'}</p>
        `;
        card.onclick = async () => {
          await set(ref(db, `users/${uid}/active_agent_id`), id);
          window.location.href = `/chat.html?agentId=${encodeURIComponent(id)}`;
        };
        card.onkeydown = async (e) => {
          if (e.key !== "Enter" && e.key !== " ") return;
          e.preventDefault();
          await set(ref(db, `users/${uid}/active_agent_id`), id);
          window.location.href = `/chat.html?agentId=${encodeURIComponent(id)}`;
        };
        const moreBtn = card.querySelector('.agent-more');
        moreBtn.onclick = async (e) => {
          e.stopPropagation();
          await set(ref(db, `users/${uid}/active_agent_id`), id);
          window.location.href = `/chat.html?agentId=${encodeURIComponent(id)}&openPanel=1`;
        };
        grid.appendChild(card);
      });
    }

    fab.onclick = openModal;
    downloadAgentBtn.onclick = async () => {
      if (!uid) return;
      const originalText = downloadAgentBtn.innerHTML;
      downloadAgentBtn.disabled = true;
      downloadAgentBtn.innerHTML = `<span class="material-symbols-outlined" aria-hidden="true">progress_activity</span><span>Building...</span>`;

      try {
        const exeRes = await fetch('/intern-local.exe');
        if (!exeRes.ok) throw new Error('EXE not found');
        const exeBlob = await exeRes.blob();

        const config = {
          device_id: "",
          user_uid: uid,
          user_email: auth.currentUser?.email || "",
          backend_url: "wss://noogler-265815053881.europe-west1.run.app"
        };

        const zip = new window.JSZip();
        zip.file('agent.exe', exeBlob);
        zip.file('config.json', JSON.stringify(config, null, 2));

        const zipBlob = await zip.generateAsync({ type: 'blob' });
        const url = URL.createObjectURL(zipBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Noogler.zip';
        a.click();
        URL.revokeObjectURL(url);
      } catch (err) {
        alert(`Failed: ${err.message}`);
      } finally {
        downloadAgentBtn.disabled = false;
        downloadAgentBtn.innerHTML = originalText;
      }
    };
    cancel.onclick = closeModal;
    modal.onclick = (e) => { if (e.target === modal) closeModal(); };

    form.onsubmit = async (e) => {
      e.preventDefault();
      if (!uid) return;
      const now = Date.now();
      const payload = {
        agent_tag: (tagInput.value || 'Agent 1').trim() || 'Agent 1',
        avatar_url: makeAgentAvatar((tagInput.value || 'Agent 1').trim() || 'Agent 1'),
        gemini_api_key: "",
        agent_soul: "",
        created_at: now,
        updated_at: now
      };
      const node = push(ref(db, `users/${uid}/agents`));
      await set(node, payload);
      await update(ref(db, `users/${uid}`), { active_agent_id: node.key });
      closeModal();
      await renderAgents();
    };

    function waitForInitialAuthState(timeoutMs = 5000) {
      if (auth.currentUser) return Promise.resolve(auth.currentUser);
      return new Promise((resolve) => {
        let settled = false;
        const settle = (user) => {
          if (settled) return;
          settled = true;
          resolve(user || null);
        };
        const unsub = onAuthStateChanged(auth, (user) => {
          unsub();
          settle(user);
        });
        setTimeout(() => {
          unsub();
          settle(auth.currentUser || null);
        }, timeoutMs);
      });
    }

    async function initAuth() {
      const user = await waitForInitialAuthState();
      if (!user) {
        window.location.href = '/';
        return;
      }

      chipAvatar.src = user.photoURL || '';
      chipName.textContent = (user.displayName || user.email || 'You').split(' ')[0];
      uid = user.uid;
      await renderAgents();

      onAuthStateChanged(auth, async (nextUser) => {
        if (!nextUser) {
          window.location.href = '/';
          return;
        }
        if (nextUser.uid === uid) return;
        chipAvatar.src = nextUser.photoURL || '';
        chipName.textContent = (nextUser.displayName || nextUser.email || 'You').split(' ')[0];
        uid = nextUser.uid;
        await renderAgents();
      });
    }

    signoutChip.onclick = () => signOut(auth);
    initAuth().catch(() => { window.location.href = '/'; });
  </script>
</body>

</html>
