<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Noogler</title>
  <link rel="stylesheet" href="/src/shared/styles.css" />
  <!-- JSZip for client-side zip generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    /* ── Custom Landing Overrides ── */
    body {
      overflow-y: auto; /* Allow scrolling on landing */
      background-color: var(--bg-primary);
    }

    .landing-shell {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: var(--space-xl) var(--space-md);
      max-width: 500px;
      margin: 0 auto;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: left;
      gap: var(--space-md);
      padding: var(--space-xl) 0;
    }

    .hero h1 {
      font-size: clamp(3rem, 10vw, 4.5rem);
      margin: 0;
      line-height: 1.1;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .lead {
      font-size: var(--text-base);
      color: var(--text-secondary);
      max-width: 95%;
      margin: 0;
      line-height: 1.6;
    }

    /* ── Navigation / Bottom Bar ── */
    .cta-area {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .nav-buttons {
      display: flex;
      gap: var(--space-sm);
      width: 100%;
    }

    .nav-buttons .btn {
      flex: 1;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Google sign-in button */
    .btn.google {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-xs);
      background: white;
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-sm);
      width: 100%;
      height: 52px;
    }

    /* sign-out chip */
    .signout-chip {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-xs) var(--space-sm);
      background-color: var(--bg-secondary);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 600;
      align-self: flex-start;
      margin-bottom: var(--space-lg);
      cursor: pointer;
      border: 1px solid var(--border-color);
      transition: background-color 0.2s;
    }

    .signout-chip:active {
      background-color: var(--bg-tertiary);
    }

    .signout-chip img {
      width: 24px;
      height: 24px;
      border-radius: var(--radius-full);
    }

    .signout-chip .signout-label {
      color: var(--text-muted);
      font-weight: 400;
      margin-left: 2px;
    }

    /* loading spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-top-color: var(--text-primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden { display: none !important; }
  </style>
</head>

<body>
  <div class="landing-shell">
    <!-- Sign-out chip (shown when logged in) -->
    <div id="signout-chip" class="signout-chip hidden">
      <img id="chip-avatar" src="" alt="avatar" />
      <span id="chip-name">Tobi</span>
      <span class="signout-label">· Sign out</span>
    </div>

    <main class="hero">
      <h1>Noogler</h1>
      <p class="lead">
        Your AI intern, that can operate your desktop like a human operator — eyes, ears, hands, and a calm reporting
        voice, whatever you can do on your pc, he can do and you can both work together
      </p>
    </main>

    <div class="cta-area">
      <div id="state-loading">
        <button class="btn primary" style="width: 100%;" disabled>
          <span class="spinner" style="border-top-color: white;"></span>
        </button>
      </div>

      <!-- State: Not signed in -->
      <button class="btn google hidden" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.96 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
        </svg>
        Sign in with Google
      </button>

      <!-- State: Signed in -->
      <div class="nav-buttons hidden" id="nav-pane">
        <a class="btn primary" href="/chat.html" id="btn-chat">Chat Noogle</a>
        <button class="btn secondary" id="btn-download">Download Noogle</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js';
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged
    } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyC0lb9VsaR09vuhPI1tVpmi_vtP9IMGwVM",
      authDomain: "noogler-490414.firebaseapp.com",
      databaseURL: "https://noogler-490414-default-rtdb.firebaseio.com",
      projectId: "noogler-490414",
      storageBucket: "noogler-490414.firebasestorage.app",
      messagingSenderId: "265815053881",
      appId: "1:265815053881:web:0bfa8a367670f4b04a1fe8",
      measurementId: "G-BR5XWXZRVK"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const signoutChip = document.getElementById('signout-chip');
    const chipAvatar = document.getElementById('chip-avatar');
    const chipName = document.getElementById('chip-name');
    const stateLoading = document.getElementById('state-loading');
    const btnGoogle = document.getElementById('btn-google');
    const navPane = document.getElementById('nav-pane');
    const btnDownload = document.getElementById('btn-download');

    let currentUser = null;

    function showLoggedOut() {
      stateLoading.classList.add('hidden');
      btnGoogle.classList.remove('hidden');
      navPane.classList.add('hidden');
      signoutChip.classList.add('hidden');
    }

    function showLoggedIn(user) {
      currentUser = user;
      chipAvatar.src = user.photoURL || '';
      chipName.textContent = (user.displayName || user.email || 'You').split(' ')[0];

      stateLoading.classList.add('hidden');
      btnGoogle.classList.add('hidden');
      navPane.classList.remove('hidden');
      signoutChip.classList.remove('hidden');
    }

    onAuthStateChanged(auth, (user) => {
      user ? showLoggedIn(user) : showLoggedOut();
    });

    btnGoogle.onclick = async () => {
      btnGoogle.disabled = true;
      btnGoogle.innerHTML = '<span class="spinner"></span>';
      try { await signInWithPopup(auth, provider); }
      catch (e) { 
        console.error(e); 
        btnGoogle.disabled = false; 
        btnGoogle.innerHTML = 'Sign in with Google';
      }
    };

    btnDownload.onclick = async () => {
      if (!currentUser) return;
      const originalText = btnDownload.textContent;
      btnDownload.disabled = true;
      btnDownload.innerHTML = '<span class="spinner"></span> Building...';

      try {
        const exeRes = await fetch('/intern-local.exe');
        if (!exeRes.ok) throw new Error('EXE not found');
        const exeBlob = await exeRes.blob();

        const config = {
          user_uid: currentUser.uid,
          user_email: currentUser.email || "",
          backend_url: "wss://noogler-265815053881.europe-west1.run.app"
        };

        const zip = new JSZip();
        zip.file('agent.exe', exeBlob);
        zip.file('config.json', JSON.stringify(config, null, 2));

        const zipBlob = await zip.generateAsync({ type: 'blob' });
        const url = URL.createObjectURL(zipBlob);
        const a = document.createElement('a');
        a.href = url; a.download = 'Noogler.zip';
        a.click();
        URL.revokeObjectURL(url);
      } catch (err) {
        alert('Failed: ' + err.message);
      } finally {
        btnDownload.disabled = false;
        btnDownload.textContent = originalText;
      }
    };

    signoutChip.onclick = () => signOut(auth);
  </script>
</body>

</html>
