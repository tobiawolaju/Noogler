<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Noogler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:FILL@0..1"
  />
  <link rel="stylesheet" href="/src/shared/styles.css" />
  <style>
    .chat-skeleton {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 9999;
      transition: opacity 0.25s ease;
    }
    .chat-skeleton.hide { opacity: 0; pointer-events: none; }
    .sk {
      border-radius: 12px;
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 200% 100%;
      animation: sk-shimmer 1.2s ease-in-out infinite;
    }
    .sk-head { height: 56px; }
    .sk-msg { height: 52px; width: 78%; }
    .sk-msg.me { margin-left: auto; width: 64%; }
    .sk-input { height: 52px; margin-top: auto; }
    @keyframes sk-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>

<body class="chat-body">
  <div id="chat-skeleton" class="chat-skeleton">
    <div class="sk sk-head"></div>
    <div class="sk sk-msg"></div>
    <div class="sk sk-msg me"></div>
    <div class="sk sk-msg"></div>
    <div class="sk sk-input"></div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/chat/main.js"></script>
</body>

</html>
